| TURNING OFF ITEMS:
|
| This file is used to TURN OFF items for the Building Input Editor. Items are turned off by 
| using a status of =0 for each item listed. By default all items are shown when there is no entry
| available to use. Comments can be used in the program by adding a | symbol at the beginning 
| of the line. Therefore any entries in this file that are preceeded by the | symbol are not
| valid and will use the default mode of being shown. Items that can be turned off include 
| Books, Pages, Sections, and Fields. There is a separate section denoted by square brackets[ ]
| for each of these items.
|
|   - Books are turned off by using the [BOOK] item and setting the name of the Book=0
|   - Pages are turned off by using the [PAGE] item and setting the name of the Page=0
|   - Sections are turned off by using the [SECTION] item and setting the name of the Section=0
|   - Fields are turned off by using the [FIELD] item and setting the name of the Field=0
|
|
| LIMITING VALUES:
|
| Quantity values can have a srt lower and upper limit by using the [MIN] and [MAX] sections.
|
|   - The [MIN] section is used to set the minimum value for field entries. 
|     The item name is entered followed by the equal sign and the minimum acceptable value.
|
|   - The [MAX] section is used to set the maximum value for field entries. 
|     The item name is entered followed by the equal sign and the maximum acceptable value.
|
|
| The values of items that are included in pull-down lists can be limited by the entries in 
| the database file, or by using the [OPTIONLIST] section of this file.
|
|   - The [OPTIONLIST] section is used to limit the items that appear in the pull-down lists. 
|     The item name is entered followed by the equal sign and the acceptable values where each 
|     value is separated by a comma. Only values listed will appear in the pull-down list.
| 
|
| ADDITIONAL PROGRAM FEATURES:
|
| There are some additional features aailable in the program, such as automatically entering 
| the building directory in the first pop-up screen, or removing the pop-up screen.
|
|   - The [OPTIONS] section will include the user preferences for the program options.
|     
|
| WORD TRANSLATION:
|
| Occassionally the wording used in some of the screens is unfamiliar to the user. The wording
| can be changed to more familiar wording by using the [TRANSLATION] section.
|
|   - The [TRANSLATION] section is used to change wording for labels. Labels such as Wind Bent
|     can be changed to Portal Frame in this section.
|
|
| LAUNCH PROGRAMS FROM THE DESED PROGRAM:
|
| There are occassions when programs can be launched from the DESED program and results from
| the program are transferred back to the DESED program. Programs are launched using the 
| [PROCESSING] section.
|
|   - The [PROCESSING] section is used to designate the Field or Section to add a CALC button
|     to begin a separate program. The zip code, snow load, and gutter programs are examples
|     of this feature. These are included in the [PROCESSING] section below as an example.
|
